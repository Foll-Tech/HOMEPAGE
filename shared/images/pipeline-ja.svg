<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 190" role="img" aria-label="開発パイプライン">
  <title>開発パイプライン — FT-001</title>

  <!-- ===== STAGE 1: 標的同定 (進行中) ===== -->
  <rect x="74" y="10" width="148" height="148" rx="10" fill="#3a9d91"/>
  <rect x="84" y="22" width="68" height="19" rx="9" fill="rgba(0,0,0,0.2)"/>
  <text x="118" y="35.5" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">● 進行中</text>
  <text x="148" y="60" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">標的同定</text>
  <text x="148" y="85" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700" fill="white">FT-001</text>
  <text x="148" y="107" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">顆粒膜細胞シグナリング標的。</text>
  <text x="148" y="121" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">遺伝的検証完了。</text>

  <!-- Arrow 1→2 -->
  <polygon points="224,79 238,85 224,91" fill="#94a3b8"/>

  <!-- ===== STAGE 2: ヒット探索 (進行中) ===== -->
  <rect x="240" y="10" width="148" height="148" rx="10" fill="#3a9d91"/>
  <rect x="250" y="22" width="68" height="19" rx="9" fill="rgba(0,0,0,0.2)"/>
  <text x="284" y="35.5" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">● 進行中</text>
  <text x="314" y="60" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">ヒット探索</text>
  <text x="314" y="85" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700" fill="white">FT-001</text>
  <text x="314" y="107" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">仮想スクリーニング・表現型</text>
  <text x="314" y="121" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">アッセイ実施中。</text>

  <!-- Arrow 2→3 -->
  <polygon points="390,79 404,85 390,91" fill="#94a3b8"/>

  <!-- ===== STAGE 3: リード最適化 (計画中) ===== -->
  <rect x="406" y="10" width="148" height="148" rx="10" fill="#4b6fa5"/>
  <rect x="416" y="22" width="60" height="19" rx="9" fill="rgba(0,0,0,0.2)"/>
  <text x="446" y="35.5" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">計画中</text>
  <text x="480" y="60" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">リード最適化</text>
  <text x="480" y="85" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700" fill="white">FT-001</text>
  <text x="480" y="107" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">SARキャンペーン</text>
  <text x="480" y="121" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">2026年開始予定。</text>

  <!-- Arrow 3→4 -->
  <polygon points="556,79 570,85 556,91" fill="#94a3b8"/>

