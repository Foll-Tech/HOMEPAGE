  <rect x="572" y="10" width="148" height="148" rx="10" fill="#4b6fa5"/>
  <rect x="582" y="22" width="60" height="19" rx="9" fill="rgba(0,0,0,0.2)"/>
  <text x="612" y="35.5" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">計画中</text>
  <text x="646" y="60" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">前臨床</text>
  <text x="646" y="85" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700" fill="white">FT-001</text>
  <text x="646" y="107" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">IND-enabling試験</text>
  <text x="646" y="121" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">2027年目標。</text>

  <!-- Arrow 4→5 -->
  <polygon points="722,79 736,85 722,91" fill="#94a3b8"/>

  <!-- ===== STAGE 5: 第Ⅰ相試験 (将来) ===== -->
  <rect x="738" y="10" width="148" height="148" rx="10" fill="#7d94b0"/>
  <rect x="748" y="22" width="50" height="19" rx="9" fill="rgba(0,0,0,0.2)"/>
  <text x="773" y="35.5" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">将来</text>
  <text x="812" y="60" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">第Ⅰ相試験</text>
  <text x="812" y="85" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700" fill="white">FT-001</text>
  <text x="812" y="107" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">First-in-human試験 —</text>
  <text x="812" y="121" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.85)">長期展望。</text>

  <!-- Footnote -->
  <text x="480" y="175" text-anchor="middle" font-family="'Noto Sans JP',Inter,system-ui,sans-serif" font-size="11" fill="#64748b">FT-001は社内プログラムコードです。標的の詳細は現時点では非公開です。</text>
</svg>
